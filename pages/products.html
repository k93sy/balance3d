<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Balance 3D — المنتجات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/tokens.css"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/nav.css"/>
  <link rel="stylesheet" href="../css/footer.css"/>
  <link rel="stylesheet" href="../css/products.css"/>
</head>
<body>

<div id="navMount"></div>

<main class="page-wrapper page-enter" style="padding-top:var(--nav-height)">

  <!-- Page Header -->
  <section class="page-hero">
    <div class="container">
      <div class="page-hero__content">
        <div class="section-label" data-i18n="section.products">Featured Products</div>
        <h1 class="page-hero__title" data-i18n="products.title">Our Products</h1>
        <p class="page-hero__desc" data-i18n="section.products.desc">Explore our most popular 3D printed products — ready to ship.</p>
      </div>
    </div>
  </section>

  <!-- Products Body -->
  <section class="products-body">
    <div class="container">
      <div class="products-layout">

        <!-- Sidebar Filters -->
        <aside class="products-sidebar" id="productsSidebar">
          <div class="sidebar-section">
            <h4 class="sidebar-title" id="sidebarCatTitle">Categories</h4>
            <ul class="sidebar-list" id="categoryList"><!-- JS --></ul>
          </div>
          <div class="sidebar-section">
            <h4 class="sidebar-title" id="sidebarMatTitle">Material</h4>
            <ul class="sidebar-list" id="materialList"><!-- JS --></ul>
          </div>
          <div class="sidebar-section">
            <h4 class="sidebar-title" id="sidebarPriceTitle">Price Range</h4>
            <div class="price-range" id="priceRange">
              <input type="range" min="0" max="500" value="500" class="range-input" id="priceMax"/>
              <div class="price-range-labels">
                <span>0 SAR</span>
                <span id="priceMaxLabel">500 SAR</span>
              </div>
            </div>
          </div>
        </aside>

        <!-- Main content -->
        <div class="products-main">
          <!-- Toolbar -->
          <div class="products-toolbar">
            <div class="products-search-wrap">
              <svg class="products-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input type="text" class="form-input products-search" id="productSearch" data-i18n-attr="placeholder" data-i18n="products.search" placeholder="Search products..."/>
            </div>

            <div class="products-toolbar-right">
              <span class="products-count" id="productsCount"></span>
              <select class="form-select products-sort" id="productSort">
                <option value="default" id="sortDefault">Default</option>
                <option value="price-asc" id="sortPriceAsc">Price: Low to High</option>
                <option value="price-desc" id="sortPriceDesc">Price: High to Low</option>
                <option value="rating" id="sortRating">Top Rated</option>
              </select>
              <button class="btn btn-ghost btn-icon" id="filterToggle" title="Toggle Filters">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Grid -->
          <div class="products-grid-main" id="productsGrid">
            <!-- JS rendered -->
          </div>

          <!-- Empty state -->
          <div class="products-empty" id="productsEmpty" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <h3 id="emptyTitle">No products found</h3>
            <p id="emptyDesc">Try adjusting your filters or search term.</p>
          </div>
        </div>

      </div>
    </div>
  </section>

</main>

<div id="footerMount"></div>

<script src="../js/core/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/core/db.js"></script>
<script src="../js/core/auth.js"></script>
<script src="../js/core/payment.js"></script>
<script src="../js/core/data.js"></script>
<script>App._layoutBase = "";</script>
<script src="../js/components/layout.js"></script>
<script src="../js/pages/products.js"></script>
</body>
</html>
