<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Balance 3D — إعادة تعيين كلمة المرور</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/tokens.css"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body>
<div class="auth-page page-enter">
  <div class="auth-visual">
    <div class="auth-visual__bg"></div>
    <div class="auth-visual__grid"></div>
    <a href="../index.html" class="auth-visual__logo">
      <div class="auth-visual__logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polygon points="12 2 2 7 12 12 22 7"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
      </div>
      <span class="auth-visual__logo-name">Balance 3D</span>
    </a>
    <div class="auth-visual__content">
      <h2 class="auth-visual__heading" id="vH"></h2>
      <p  class="auth-visual__desc" id="vD"></p>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-form-header">
      <h1 class="auth-form-header__title" id="fTitle"></h1>
      <p  class="auth-form-header__subtitle" id="fSub"></p>
    </div>

    <div class="auth-error-banner" id="authError">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="authErrorMsg"></span>
    </div>

    <div class="auth-success" id="authSuccess">
      <div class="auth-success__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <h3 id="sTitle"></h3>
      <p  id="sDesc"></p>
      <a href="login.html" class="btn btn-primary" id="sBtn" style="margin-top:var(--space-2)"></a>
    </div>

    <form id="resetForm" novalidate style="display:flex;flex-direction:column;gap:var(--space-5)">
      <div class="form-group">
        <label class="form-label required" for="email" id="lblEmail"></label>
        <input type="email" id="email" class="form-input" autocomplete="email" inputmode="email"/>
        <span class="form-error" id="emailErr" style="display:none">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
          <span id="emailErrMsg"></span>
        </span>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" id="resetBtn" style="width:100%">
        <span id="resetBtnLabel"></span>
      </button>
      <a href="login.html" class="btn btn-ghost" style="width:100%;justify-content:center" id="backBtn"></a>
    </form>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/core/app.js"></script>
<script src="../js/core/db.js"></script>
<script src="../js/core/auth.js"></script>
<script>
(function(){
  'use strict';
  const getLang = () => localStorage.getItem('b3d_lang') || 'ar';
  const TX = {
    ar:{ vH:'استعادة الوصول إلى حسابك', vD:'أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة التعيين.',
         fTitle:'نسيت كلمة المرور؟', fSub:'أدخل بريدك الإلكتروني المسجّل',
         lblEmail:'البريد الإلكتروني', resetBtn:'إرسال رابط الاسترداد', backBtn:'العودة لتسجيل الدخول',
         sTitle:'تم الإرسال!', sDesc:'تحقق من بريدك الإلكتروني للحصول على رابط إعادة التعيين.',
         sBtn:'تسجيل الدخول', errEmail:'بريد إلكتروني غير صالح' },
    en:{ vH:'Recover access to your account', vD:'Enter your email and we\'ll send you a reset link.',
         fTitle:'Forgot Password?', fSub:'Enter your registered email address',
         lblEmail:'Email Address', resetBtn:'Send Reset Link', backBtn:'Back to Sign In',
         sTitle:'Email Sent!', sDesc:'Check your email for the password reset link.',
         sBtn:'Sign In', errEmail:'Invalid email address' },
  };
  const t  = k => (TX[getLang()]||TX.en)[k]||(TX.en)[k]||k;
  const $  = id => document.getElementById(id);

  function applyLang() {
    const lang = getLang();
    document.documentElement.lang = lang==='ar'?'ar':'en';
    document.documentElement.dir  = lang==='ar'?'rtl':'ltr';
    $('vH').textContent         = t('vH');     $('vD').textContent         = t('vD');
    $('fTitle').textContent     = t('fTitle'); $('fSub').textContent       = t('fSub');
    $('lblEmail').textContent   = t('lblEmail');
    $('resetBtnLabel').textContent = t('resetBtn');
    $('backBtn').textContent    = t('backBtn');
    $('sTitle').textContent     = t('sTitle'); $('sDesc').textContent = t('sDesc');
    $('sBtn').textContent       = t('sBtn');
  }

  $('resetForm').addEventListener('submit', async e => {
    e.preventDefault();
    $('authError').classList.remove('show');
    const email = $('email').value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      const err = $('emailErr'), msg = $('emailErrMsg');
      if(err) err.style.display='flex'; if(msg) msg.textContent=t('errEmail'); return;
    }
    const btn = $('resetBtn');
    btn.classList.add('btn--loading'); btn.disabled=true;
    const res = await AuthService.resetPassword(email);
    btn.classList.remove('btn--loading'); btn.disabled=false;
    if (!res.ok) { $('authErrorMsg').textContent=res.error; $('authError').classList.add('show'); return; }
    $('resetForm').style.display='none';
    $('authSuccess').classList.add('show');
  });

  applyLang();
  if (typeof Toast !== 'undefined') Toast.init();
})();
</script>
</body>
</html>
