<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Balance 3D — تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/tokens.css"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body>
<div class="auth-page page-enter">

  <!-- ── Visual panel ── -->
  <div class="auth-visual">
    <div class="auth-visual__bg"></div>
    <div class="auth-visual__grid"></div>
    <a href="../index.html" class="auth-visual__logo">
      <div class="auth-visual__logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polygon points="12 2 2 7 12 12 22 7"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
      </div>
      <span class="auth-visual__logo-name">Balance 3D</span>
    </a>
    <div class="auth-visual__content">
      <h2 class="auth-visual__heading" id="vHeading"></h2>
      <p  class="auth-visual__desc"    id="vDesc"></p>
      <div class="auth-visual__features" id="vFeatures"></div>
    </div>
  </div>

  <!-- ── Form panel ── -->
  <div class="auth-form-panel">
    <div class="auth-form-header">
      <h1 class="auth-form-header__title" id="formTitle"></h1>
      <p  class="auth-form-header__subtitle" id="formSubtitle"></p>
    </div>

    <!-- Purchase-context banner (shown when redirected from add-to-cart / checkout) -->
    <div id="purchaseBanner" style="display:none;align-items:center;gap:.6rem;
         background:rgba(15,118,110,.08);border:1px solid rgba(15,118,110,.22);
         border-radius:12px;padding:.65rem 1rem;margin-bottom:1rem;font-size:.87rem;
         font-weight:600;color:#0f766e">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span id="purchaseBannerMsg"></span>
    </div>

    <!-- Global error -->
    <div class="auth-error-banner" id="authError">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="authErrorMsg"></span>
    </div>

    <!-- Success state -->
    <div class="auth-success" id="authSuccess">
      <div class="auth-success__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h3 id="successTitle"></h3>
      <p  id="successDesc"></p>
      <a href="../index.html" class="btn btn-primary" id="successBtn" style="margin-top:var(--space-2)"></a>
    </div>

    <!-- Method tabs -->
    <div class="auth-tabs" id="authTabs">
      <button class="auth-tab active" data-tab="email" id="tabEmail"></button>
      <button class="auth-tab"        data-tab="phone" id="tabPhone"></button>
    </div>

    <!-- ── EMAIL PANEL ── -->
    <div class="auth-panel active" id="panelEmail">
      <form id="emailForm" novalidate style="display:flex;flex-direction:column;gap:var(--space-5)">
        <div class="form-group">
          <label class="form-label required" for="email" id="lblEmail"></label>
          <input type="email" id="email" class="form-input" autocomplete="email" inputmode="email"/>
          <span class="form-error" id="emailErr" style="display:none">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="emailErrMsg"></span>
          </span>
        </div>
        <div class="form-group">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-3)">
            <label class="form-label required" for="password" id="lblPassword"></label>
            <a href="forgot-password.html" class="auth-forgot-link" id="lnkForgot"></a>
          </div>
          <div class="input-password-wrap">
            <input type="password" id="password" class="form-input" autocomplete="current-password"/>
            <button type="button" class="input-toggle-pw" id="togglePw" aria-label="show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" id="eyeIcon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="form-error" id="passwordErr" style="display:none">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="passwordErrMsg"></span>
          </span>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" id="emailBtn" style="width:100%">
          <span id="emailBtnLabel"></span>
        </button>
      </form>

      <div class="divider-text"><span id="lblOr"></span></div>

      <!-- Social buttons -->
      <div class="auth-social-grid">
        <button class="auth-social-btn" id="btnGoogle" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span id="lblGoogle"></span>
        </button>
        <button class="auth-social-btn auth-social-btn--apple" id="btnApple" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.56-1.31 3.1-2.54 4.08zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
          </svg>
          <span id="lblApple"></span>
        </button>
      </div>
    </div>

    <!-- ── PHONE PANEL ── -->
    <div class="auth-panel" id="panelPhone">
      <!-- Phone entry -->
      <div id="phoneEntry" style="display:flex;flex-direction:column;gap:var(--space-5)">
        <div class="form-group">
          <label class="form-label required" id="lblPhone"></label>
          <div class="phone-input-wrap">
            <div class="phone-country">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/></svg>
              <select id="phoneCountry" aria-label="Country code">
                <option value="+966">🇸🇦 +966</option>
                <option value="+971">🇦🇪 +971</option>
                <option value="+965">🇰🇼 +965</option>
                <option value="+973">🇧🇭 +973</option>
                <option value="+974">🇶🇦 +974</option>
                <option value="+968">🇴🇲 +968</option>
                <option value="+1">🇺🇸 +1</option>
                <option value="+44">🇬🇧 +44</option>
              </select>
            </div>
            <input type="tel" id="phoneNumber" class="form-input phone-number"
                   inputmode="numeric" autocomplete="tel" placeholder="5xxxxxxxx"/>
          </div>
          <span class="form-error" id="phoneErr" style="display:none">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="phoneErrMsg"></span>
          </span>
        </div>
        <button type="button" class="btn btn-primary btn-lg" id="phoneSendBtn" style="width:100%">
          <span id="phoneSendLabel"></span>
        </button>
      </div>

      <!-- OTP entry -->
      <div class="otp-section" id="otpSection">
        <button type="button" class="otp-back" id="otpBackBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
          <span id="otpBackLabel"></span>
        </button>
        <p class="otp-hint" id="otpHint"></p>
        <div class="otp-digits" id="otpDigits">
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code"/>
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        </div>
        <p class="otp-hint">
          <span id="otpResendLabel"></span>
          <button type="button" class="otp-resend" id="otpResendBtn"></button>
          <span class="otp-timer" id="otpTimer"></span>
        </p>
        <button type="button" class="btn btn-primary btn-lg" id="otpVerifyBtn" style="width:100%">
          <span id="otpVerifyLabel"></span>
        </button>
      </div>
    </div>

  </div><!-- /auth-form-panel -->
</div><!-- /auth-page -->

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/core/app.js"></script>
<script src="../js/core/db.js"></script>
<script src="../js/core/auth.js"></script>
<script>
/* ================================================================
   Login page controller
   ================================================================ */
(function () {
  'use strict';

  const getLang = () => localStorage.getItem('b3d_lang') || 'ar';
  const isAr    = () => getLang() === 'ar';

  /* ---- i18n ---- */
  const TX = {
    ar: {
      heading:       'رحلتك في الطباعة ثلاثية الأبعاد تبدأ هنا',
      desc:          'سجّل دخولك للوصول إلى طلباتك، تتبع شحناتك، وإدارة تصاميمك المخصصة.',
      features:      ['تتبع طلباتك في الوقت الفعلي', 'إدارة طلباتك المخصصة', 'عروض حصرية للأعضاء'],
      formTitle:     'مرحباً بعودتك',
      subtitle:      'ليس لديك حساب؟ <a href="register.html" style="color:var(--clr-accent);font-weight:600">سجّل الآن</a>',
      tabEmail:      'البريد الإلكتروني',
      tabPhone:      'رقم الجوال',
      lblEmail:      'البريد الإلكتروني',
      lblPassword:   'كلمة المرور',
      lblForgot:     'نسيت كلمة المرور؟',
      emailBtn:      'تسجيل الدخول',
      lblOr:         'أو تابع بـ',
      lblGoogle:     'Google',
      lblApple:      'Apple',
      lblPhone:      'رقم الجوال',
      phoneSend:     'إرسال رمز التحقق',
      otpBack:       'تغيير الرقم',
      otpHint:       'أدخل الرمز المكوّن من 6 أرقام المرسل إلى',
      otpResend:     'لم يصلك الرمز؟',
      otpResendBtn:  'إعادة الإرسال',
      otpVerify:     'تحقق وادخل',
      successTitle:  'تم تسجيل الدخول!',
      successDesc:   'جاري تحويلك...',
      successBtn:    'الذهاب للرئيسية',
      errRequired:   'مطلوب',
      errEmail:      'بريد إلكتروني غير صالح',
      errPhone:      'أدخل رقم جوال صحيح',
      errPw:         'مطلوب',
    },
    en: {
      heading:       'Your 3D Printing Journey Starts Here',
      desc:          'Sign in to access your orders, track shipments, and manage custom designs.',
      features:      ['Track your orders in real time', 'Manage your custom print requests', 'Exclusive member offers'],
      formTitle:     'Welcome Back',
      subtitle:      'Don\'t have an account? <a href="register.html" style="color:var(--clr-accent);font-weight:600">Register</a>',
      tabEmail:      'Email',
      tabPhone:      'Phone',
      lblEmail:      'Email Address',
      lblPassword:   'Password',
      lblForgot:     'Forgot password?',
      emailBtn:      'Sign In',
      lblOr:         'or continue with',
      lblGoogle:     'Google',
      lblApple:      'Apple',
      lblPhone:      'Phone Number',
      phoneSend:     'Send OTP',
      otpBack:       'Change number',
      otpHint:       'Enter the 6-digit code sent to',
      otpResend:     'Didn\'t get the code?',
      otpResendBtn:  'Resend',
      otpVerify:     'Verify & Sign In',
      successTitle:  'Signed in!',
      successDesc:   'Redirecting you...',
      successBtn:    'Go to Homepage',
      errRequired:   'Required',
      errEmail:      'Invalid email address',
      errPhone:      'Enter a valid phone number',
      errPw:         'Required',
    },
  };

  const t  = k => (TX[getLang()] || TX.en)[k] || (TX.en)[k] || k;
  const $  = id => document.getElementById(id);
  const el = (sel) => document.querySelector(sel);

  /* ---- Apply language ---- */
  function applyLang() {
    const lang = getLang();
    document.documentElement.lang = lang === 'ar' ? 'ar' : 'en';
    document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';
    $('vHeading').textContent = t('heading');
    $('vDesc').textContent    = t('desc');
    $('vFeatures').innerHTML  = t('features').map(f =>
      `<div class="auth-visual__feature">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
         <span>${f}</span>
       </div>`).join('');
    $('formTitle').textContent     = t('formTitle');
    $('formSubtitle').innerHTML    = t('subtitle');
    $('tabEmail').textContent      = t('tabEmail');
    $('tabPhone').textContent      = t('tabPhone');
    $('lblEmail').textContent      = t('lblEmail');
    $('lblPassword').textContent   = t('lblPassword');
    $('lnkForgot').textContent     = t('lblForgot');
    $('emailBtnLabel').textContent = t('emailBtn');
    $('lblOr').textContent         = t('lblOr');
    $('lblGoogle').textContent     = t('lblGoogle');
    $('lblApple').textContent      = t('lblApple');
    $('lblPhone').textContent      = t('lblPhone');
    $('phoneSendLabel').textContent= t('phoneSend');
    $('otpBackLabel').textContent  = t('otpBack');
    $('otpResendLabel').textContent= t('otpResend');
    $('otpResendBtn').textContent  = t('otpResendBtn');
    $('otpVerifyLabel').textContent= t('otpVerify');
    $('successTitle').textContent  = t('successTitle');
    $('successDesc').textContent   = t('successDesc');
    $('successBtn').textContent    = t('successBtn');

    /* ── Purchase-context banner ─────────────────────────────────────────
       When ?reason=purchase is in the URL (redirected from add-to-cart or
       checkout), show a friendly "login to purchase" hint at the top.
       Also update the "Register" link to carry ?next= so the round-trip
       works: Product → add-to-cart → login → (or) register → login → back. */
    const params    = new URLSearchParams(window.location.search);
    const reason    = params.get('reason');
    const nextParam = params.get('next');
    const banner    = $('purchaseBanner');
    const bannerMsg = $('purchaseBannerMsg');

    if (reason === 'purchase' && banner && bannerMsg) {
      bannerMsg.textContent = lang === 'ar'
        ? 'سجّل دخولك لإتمام عملية الشراء'
        : 'Sign in to complete your purchase';
      banner.style.display = 'flex';
    }

    /* Update "Register" link in subtitle to carry ?next= so the round-trip completes */
    if (nextParam) {
      const regLink = $('formSubtitle')?.querySelector('a[href*="register"]');
      if (regLink) {
        const regBase = regLink.getAttribute('href').split('?')[0];
        regLink.href  = regBase + '?next=' + encodeURIComponent(nextParam) + '&reason=' + (reason || 'purchase');
      }
    }
  }

  /* ---- Helpers ---- */
  function showError(msg) {
    $('authErrorMsg').textContent = msg;
    $('authError').classList.add('show');
  }
  function hideError() { $('authError').classList.remove('show'); }

  function showFieldErr(errId, msgId, msg) {
    const e = $(errId), m = $(msgId);
    if (e) e.style.display = 'flex'; if (m) m.textContent = msg;
  }
  function hideFieldErr(errId) { const e=$(errId); if(e) e.style.display='none'; }

  function setLoading(btnId, loading) {
    const btn = $(btnId);
    if (!btn) return;
    btn.disabled = loading;
    btn.classList.toggle('btn--loading', loading);
  }

  function showSuccess() {
    $('authTabs').style.display        = 'none';
    $('panelEmail').style.display      = 'none';
    $('panelPhone').style.display      = 'none';
    $('authSuccess').classList.add('show');
    setTimeout(() => {
      const next = new URLSearchParams(window.location.search).get('next');
      window.location.href = next || '../index.html';
    }, 1800);
  }

  function showToast(msg, type) {
    if (typeof Toast !== 'undefined') Toast.show(msg, type);
  }

  /* ---- Tabs ---- */
  document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      $('panel' + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1)).classList.add('active');
      hideError();
    });
  });

  /* ---- Password toggle ---- */
  $('togglePw').addEventListener('click', () => {
    const pw = $('password'); const show = pw.type === 'password';
    pw.type = show ? 'text' : 'password';
    $('eyeIcon').innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  /* ---- Email sign-in ---- */
  $('emailForm').addEventListener('submit', async e => {
    e.preventDefault(); hideError();
    const email = $('email').value.trim();
    const pw    = $('password').value;
    let valid   = true;

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showFieldErr('emailErr','emailErrMsg', t('errEmail')); valid = false;
    } else hideFieldErr('emailErr');

    if (!pw) {
      showFieldErr('passwordErr','passwordErrMsg', t('errPw')); valid = false;
    } else hideFieldErr('passwordErr');

    if (!valid) return;
    setLoading('emailBtn', true);

    const res = await AuthService.signInEmail(email, pw);
    setLoading('emailBtn', false);

    if (!res.ok) { showError(res.error); return; }
    showSuccess();
  });

  /* ---- Google ---- */
  $('btnGoogle').addEventListener('click', async () => {
    hideError();
    const res = await AuthService.signInGoogle();
    if (!res.ok) showError(res.error);
    // If ok, browser redirects — nothing else to do
  });

  /* ---- Apple ---- */
  $('btnApple').addEventListener('click', async () => {
    hideError();
    const res = await AuthService.signInApple();
    if (!res.ok) showError(res.error);
  });

  /* ---- Phone: send OTP ---- */
  let _pendingPhone = '';
  $('phoneSendBtn').addEventListener('click', async () => {
    hideError();
    const code   = $('phoneCountry').value;
    const number = $('phoneNumber').value.replace(/\D/g, '');
    if (!number || number.length < 7) {
      showFieldErr('phoneErr','phoneErrMsg', t('errPhone')); return;
    }
    hideFieldErr('phoneErr');
    _pendingPhone = code + number;

    setLoading('phoneSendBtn', true);
    const res = await AuthService.signInPhone(_pendingPhone);
    setLoading('phoneSendBtn', false);

    if (!res.ok) { showError(res.error); return; }

    // Show OTP section
    $('phoneEntry').style.display = 'none';
    $('otpSection').classList.add('show');
    $('otpHint').textContent = t('otpHint') + ' ' + _pendingPhone;
    startOtpTimer();
    $('otpDigits').querySelector('.otp-digit').focus();
  });

  /* ---- OTP digits wiring ---- */
  const digits = document.querySelectorAll('.otp-digit');
  digits.forEach((d, i) => {
    d.addEventListener('input', () => {
      d.value = d.value.replace(/\D/g, '').slice(-1);
      d.classList.toggle('filled', !!d.value);
      if (d.value && i < digits.length - 1) digits[i + 1].focus();
    });
    d.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !d.value && i > 0) digits[i - 1].focus();
    });
    d.addEventListener('paste', e => {
      e.preventDefault();
      const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
      [...paste].forEach((ch, j) => { if (digits[j]) { digits[j].value = ch; digits[j].classList.add('filled'); } });
      if (digits[Math.min(paste.length, 5)]) digits[Math.min(paste.length, 5)].focus();
    });
  });

  /* ---- OTP verify ---- */
  $('otpVerifyBtn').addEventListener('click', async () => {
    hideError();
    const code = [...digits].map(d => d.value).join('');
    if (code.length < 6) { showError(isAr() ? 'أدخل الرمز كاملاً' : 'Enter the full 6-digit code'); return; }
    setLoading('otpVerifyBtn', true);
    const res = await AuthService.verifyOtp(_pendingPhone, code);
    setLoading('otpVerifyBtn', false);
    if (!res.ok) { showError(res.error); digits.forEach(d => { d.value=''; d.classList.remove('filled'); }); digits[0].focus(); return; }
    showSuccess();
  });

  /* ---- OTP back ---- */
  $('otpBackBtn').addEventListener('click', () => {
    $('otpSection').classList.remove('show');
    $('phoneEntry').style.display = 'flex';
    digits.forEach(d => { d.value=''; d.classList.remove('filled'); });
    hideError(); clearOtpTimer();
  });

  /* ---- OTP resend ---- */
  $('otpResendBtn').addEventListener('click', async () => {
    if (!_pendingPhone) return;
    $('otpResendBtn').disabled = true;
    const res = await AuthService.signInPhone(_pendingPhone);
    if (res.ok) { showToast(isAr() ? 'تم إعادة الإرسال' : 'Code resent', 'success'); startOtpTimer(); }
    else { showError(res.error); $('otpResendBtn').disabled = false; }
  });

  /* ---- OTP countdown timer ---- */
  let _timerInterval;
  function startOtpTimer() {
    clearOtpTimer();
    let secs = 60;
    $('otpResendBtn').disabled = true;
    $('otpTimer').textContent  = ' (' + secs + 's)';
    _timerInterval = setInterval(() => {
      secs--;
      $('otpTimer').textContent = secs > 0 ? ' (' + secs + 's)' : '';
      if (secs <= 0) { clearOtpTimer(); $('otpResendBtn').disabled = false; }
    }, 1000);
  }
  function clearOtpTimer() { clearInterval(_timerInterval); $('otpTimer').textContent = ''; }

  /* ---- Init ---- */
  applyLang();
  if (typeof Toast !== 'undefined') Toast.init();

  // If already logged in, redirect
  (async () => {
    const session = await AuthService.getSession();
    if (session) {
      const next = new URLSearchParams(window.location.search).get('next');
      window.location.href = next || '../index.html';
    }
  })();
})();
</script>
</body>
</html>
