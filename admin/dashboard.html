<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Balance 3D — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/admin-tokens.css"/>
  <link rel="stylesheet" href="css/admin-base.css"/>
  <link rel="stylesheet" href="css/admin-layout.css"/>
  <link rel="stylesheet" href="css/admin-components.css"/>
</head>
<body>

<div class="adm-shell">

  <!-- SIDEBAR -->
  <aside class="adm-sidebar" id="adminSidebar" aria-label="Admin navigation"></aside>

  <!-- TOPBAR -->
  <header class="adm-topbar" id="adminTopbar" role="banner"></header>

  <!-- MAIN CONTENT -->
  <main class="adm-main" id="adminMain">
    <div class="adm-section" id="section-dashboard"></div>
    <div class="adm-section" id="section-analytics"></div>
    <div class="adm-section" id="section-products"></div>
    <div class="adm-section" id="section-categories"></div>
    <div class="adm-section" id="section-orders"></div>
    <div class="adm-section" id="section-customers"></div>
    <div class="adm-section" id="section-shipping"></div>
    <div class="adm-section" id="section-payments"></div>
    <div class="adm-section" id="section-reviews"></div>
    <div class="adm-section" id="section-discounts"></div>
    <div class="adm-section" id="section-settings"></div>
  </main>
</div>

<!-- Mobile overlay -->
<div class="adm-overlay" id="admOverlay" onclick="Admin.closeSidebar()"></div>

<!-- Scripts — order matters -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/core/db.js"></script>
<script src="../js/core/auth.js"></script>
<script src="js/admin-data.js"></script>
<script src="js/admin-core.js"></script>
<script src="js/admin-sections.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  /* ── Auth guard ── */
  if (!AuthService.requireAdmin('login.html')) return;

  /* ── Apply saved language ── */
  const lang = localStorage.getItem('b3d_admin_lang') || 'ar';
  document.documentElement.lang = lang === 'ar' ? 'ar' : 'en';
  document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';
  Admin.lang = lang;

  /* ── Refresh badge counters ── */
  Admin._refreshBadges();

  /* ── Render shell + initial section ── */
  Admin.renderShell();

  /* ── Read hash for deep-link (#products, #orders…) ── */
  const hash    = (location.hash||'').replace('#','');
  const SECTIONS= ['dashboard','analytics','products','categories','orders','customers','shipping','payments','reviews','discounts','settings'];
  Admin.navigate(SECTIONS.includes(hash) ? hash : 'dashboard', false);

  /* ── Keyboard shortcuts ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.getElementById('admModalBackdrop')?.classList.remove('show');
      document.getElementById('admConfirm')?.classList.remove('show');
      Admin.closeSidebar();
    }
  });
});
</script>
</body>
</html>
